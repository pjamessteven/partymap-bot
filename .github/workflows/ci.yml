name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # API Unit Tests (SQLite, fast)
  # ---------------------------------------------------------------------------
  api-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # API Integration Tests (PostgreSQL + Redis)
  # ---------------------------------------------------------------------------
  api-integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: partymap_test
        ports:
          - 5439:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5439/partymap_test
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5439/partymap_test
          REDIS_URL: redis://localhost:6380/0
          OPENROUTER_API_KEY: test-key
          EXA_API_KEY: test-key
          PARTYMAP_API_KEY: test-key
        run: pytest tests/integration/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Web Type Check & Lint
  # ---------------------------------------------------------------------------
  web-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Docker Build (multi-stage, includes unit tests)
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [api-unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t partymap-api apps/api/

      - name: Build Web Docker image
        run: docker build -t partymap-web apps/web/

      - name: Test docker-compose
        run: docker-compose -f docker-compose.yml -f docker-compose.dev.yml config > /dev/null
