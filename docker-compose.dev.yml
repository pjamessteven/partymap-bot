# Docker Compose override for development
# Enables hot reloading for all services
#
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or set COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml in your .env

version: "3.8"

services:
  api:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    volumes:
      - ./apps/api/src:/app/src:cached
      - ./apps/api/migrations:/app/migrations:cached
      - ./apps/api/alembic.ini:/app/alembic.ini:cached
      - ./apps/api/entrypoint.sh:/app/entrypoint.sh:cached
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug

  worker:
    # Use watchfiles for Celery worker hot reload
    command: watchfiles --filter python "celery -A src.tasks.celery_app worker -l info -Q celery,discovery,dedup,research,sync,refresh -c 2" /app/src
    volumes:
      - ./apps/api/src:/app/src:cached
      - ./apps/api/entrypoint.sh:/app/entrypoint.sh:cached
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug
    # Install watchfiles on startup
    entrypoint: ["/bin/sh", "-c", "pip install watchfiles >/dev/null 2>&1 && /app/entrypoint.sh $@", "--"]

  scheduler:
    # Use watchfiles for Celery beat hot reload
    command: watchfiles --filter python "celery -A src.tasks.celery_app beat -l info --scheduler src.tasks.scheduler:DatabaseScheduler" /app/src
    volumes:
      - ./apps/api/src:/app/src:cached
      - ./apps/api/entrypoint.sh:/app/entrypoint.sh:cached
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug
    entrypoint: ["/bin/sh", "-c", "pip install watchfiles >/dev/null 2>&1 && /app/entrypoint.sh $@", "--"]

  web:
    # Override build to use dev Dockerfile
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    # Use Next.js dev mode with hot reload
    # Install deps if needed, then start dev server
    command: >
      sh -c "
        if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.json ]; then
          echo 'Installing node_modules...'
          npm install --legacy-peer-deps
        fi
        npm run dev
      "
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    environment:
      - NODE_ENV=development
      - API_HOST=api
      - API_PORT=8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
      - CHOKIDAR_LEGACY_WATCH=true
      - WATCHPACK_POLLING=500
      - NEXT_WEBPACK_POLLING=500
      - FAST_REFRESH=true
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"

volumes:
  web_node_modules:
  web_next:
